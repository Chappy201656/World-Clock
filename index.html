<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/style.css" />
    <title>World Clock</title>
  </head>
  <body>
    <div class="container">
      <h1>World Clock</h1>

      <select>
        <option value="">Select a city..</option>
        <option value="">New York</option>
        <option value="">London</option>
        <option value="">San Diego</option>
      </select>

      <div class="city">
        <div>
          <h2>Tokyo</h2>
          <div class="date">August 17th 2023</div>
        </div>
        <div class="time">05:30:25<small> PM </small></div>
      </div>
      <div class="city">
        <div>
          <h2>London</h2>
          <div class="date">August 17th 2023</div>
        </div>
        <div class="time">05:30:25<small> PM </small></div>
      </div>
    </div>
    <footer>
      Coded by <strong>Brittany Chapman</strong> and is open sourced on
      <a href="https://github.com/Chappy201656/World-Clock" target="_blank"
        ><strong>GitHub</strong></a
      >
    </footer>
    <script src="JavaScript/java.js"></script>
  </body>
</html>
